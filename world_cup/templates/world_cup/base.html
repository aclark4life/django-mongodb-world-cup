<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}World Cup 2026{% endblock %}</title>
    <style>
        :root {
            --nav-bg: #1C2D38;
            --page-bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-primary: #1C2D38;
            --text-secondary: #5c6970;
            --border: #e2e5e9;
            --accent: #1a6b4b;
            --accent-light: #e8f5ef;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--page-bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        nav {
            background: var(--nav-bg);
            padding: 0.9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid var(--accent);
        }

        nav .brand {
            color: var(--white);
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
        }

        nav .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.9rem;
        }

        nav .nav-links a:hover {
            color: var(--white);
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        header {
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .card:hover {
            border-color: var(--accent);
        }

        .card a {
            text-decoration: none;
            color: var(--text-primary);
            display: block;
        }

        .card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            background: var(--accent);
            color: var(--white);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        td {
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">World Cup 2026 Stats</a>
        <div class="nav-links">
            <a href="{% url 'tournament_goals' %}">Goals</a>
            <a href="{% url 'top_scorers' %}">Scorers</a>
            <a href="{% url 'query_shell' %}">Shell</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
